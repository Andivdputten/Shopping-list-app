<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#2e7d32" />
  <title>Grocery Scanner</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Grocery Scanner</h1>
    <p class="subtitle">Shopping list - step 7</p>
  </header>

  <main class="container">
    <section class="card">
      <h2 id="formTitle">Add item</h2>

      <div class="form-stack">
        <input
          id="itemInput"
          type="text"
          placeholder="Item name, e.g. Bananas"
          autocomplete="off"
        />

        <div class="input-row">
          <input
            id="quantityInput"
            type="number"
            inputmode="decimal"
            min="0"
            step="any"
            placeholder="Quantity"
          />

          <select id="unitInput">
            <option value="">No unit</option>
            <option value="pcs">pcs</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="l">l</option>
            <option value="pack">pack</option>
            <option value="bottle">bottle</option>
            <option value="can">can</option>
          </select>
        </div>

        <select id="categoryInput">
          <option value="">Uncategorised</option>
          <option value="Produce">Produce</option>
          <option value="Dairy">Dairy</option>
          <option value="Pantry">Pantry</option>
          <option value="Frozen">Frozen</option>
          <option value="Drinks">Drinks</option>
          <option value="Household">Household</option>
          <option value="Personal care">Personal care</option>
        </select>

        <div class="action-row">
          <button id="addButton" class="primary-button">Add item</button>
          <button id="cancelEditButton" class="secondary-button hidden">Cancel edit</button>
        </div>
      </div>

      <p id="status" class="status-text">Ready.</p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Your shopping list</h2>
        <button id="clearButton" class="secondary-button">Clear all</button>
      </div>

      <p class="hint-text">Tap an item to mark it bought or unbought.</p>

      <div id="shoppingSections"></div>

      <p id="emptyMessage" class="empty-message">
        Your list is empty.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
