<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#2e7d32" />
  <title>Grocery Scanner</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Grocery Scanner</h1>
    <p class="subtitle">First phone setup test</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Status</h2>
      <p id="status">Loading app...</p>
    </section>

    <section class="card">
      <h2>What comes next</h2>
      <ul>
        <li>Shopping list</li>
        <li>Barcode scan</li>
        <li>Nutrition lookup</li>
        <li>Recipe macros</li>
      </ul>
    </section>

    <button id="testButton">Tap me</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
