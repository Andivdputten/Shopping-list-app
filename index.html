<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#2e7d32" />
  <title>Grocery Scanner</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Grocery Scanner</h1>
    <p class="subtitle">Shopping list - step 3</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Add item</h2>

      <div class="input-row">
        <input
          id="itemInput"
          type="text"
          placeholder="e.g. Bananas"
          autocomplete="off"
        />
        <button id="addButton" class="primary-button">Add</button>
      </div>

      <p id="status" class="status-text">Ready.</p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Your shopping list</h2>
        <button id="clearButton" class="secondary-button">Clear all</button>
      </div>

      <p class="hint-text">Tap an item to mark it bought or unbought.</p>

      <ul id="shoppingList" class="shopping-list"></ul>

      <p id="emptyMessage" class="empty-message">
        Your list is empty.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
